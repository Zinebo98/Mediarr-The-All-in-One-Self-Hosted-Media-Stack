# ─────────────────────────────────────────────────────────────────────────────
#  Mediarr — docker-compose (consolidated for documentation)
#
#  In the live deployment these run as four separate stacks under
#  /opt/{mediastack,aiometadata,aiostreams,torboxarr}, each with its own .env.
#  Merged here into one file so the whole stack is visible at a glance.
#  No secrets are stored here — credentials are injected via per-stack .env.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Media server (hardware-accelerated) ──────────────────────────────
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - LIBVA_DRIVER_NAME=iHD            # Intel QSV / VAAPI
    volumes:
      - /opt/mediastack/appdata/jellyfin:/config
      - /srv/media:/srv/media
      - /mnt/debrid:/mnt/debrid:rslave
    devices:
      - /dev/dri:/dev/dri                # passed-through Intel iGPU
    group_add:
      - "991"                            # host 'render' group GID (getent group render)
    ports:
      - "8096:8096"
    restart: unless-stopped

  # ── Acquisition (*arr) ───────────────────────────────────────────────
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /opt/mediastack/appdata/prowlarr:/config
    ports:
      - "9696:9696"
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /opt/mediastack/appdata/radarr:/config
      - /srv/media:/srv/media
      - /mnt/debrid:/mnt/debrid:rslave
    ports:
      - "7878:7878"
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /opt/mediastack/appdata/sonarr:/config
      - /srv/media:/srv/media
      - /mnt/debrid:/mnt/debrid:rslave
    ports:
      - "8989:8989"
    restart: unless-stopped

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /opt/mediastack/appdata/bazarr:/config
      - /srv/media:/srv/media
      - /mnt/debrid:/mnt/debrid:rslave
    ports:
      - "6767:6767"
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - TZ=${TZ}
      - LOG_LEVEL=info
    ports:
      - "8191:8191"
    restart: unless-stopped

  recyclarr:
    image: ghcr.io/recyclarr/recyclarr:8
    container_name: recyclarr
    user: 1000:1000
    environment:
      - TZ=${TZ}
    volumes:
      - /opt/mediastack/appdata/recyclarr:/config
    restart: "no"

  # ── Requests ─────────────────────────────────────────────────────────
  seerr:                              # formerly Jellyseerr — now seerr-team/seerr
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    environment:
      - TZ=${TZ}
    volumes:
      - /opt/mediastack/appdata/seerr:/app/config
    ports:
      - "5055:5055"
    restart: unless-stopped

  # ── AI subtitles (speech-to-text) ────────────────────────────────────
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:v1.9.1   # pinned, don't drift on :latest
    container_name: whisper
    environment:
      - ASR_ENGINE=faster_whisper
      - ASR_MODEL=small.en          # near-large accuracy, still fast
      - ASR_DEVICE=cpu
      - ASR_QUANTIZATION=int8
      - MODEL_IDLE_TIMEOUT=300
      - OMP_NUM_THREADS=6
      - SUBTITLE_MAX_LINE_WIDTH=42
      - SUBTITLE_MAX_LINE_COUNT=2
    cpus: "6.0"
    volumes:
      - /mnt/appdata/whisper-cache:/root/.cache
      - /srv/media:/srv/media:ro
    ports:
      - "9000:9000"
    restart: unless-stopped

  # ── Download backends (debrid) ───────────────────────────────────────
  decypharr:
    image: ghcr.io/sirrobot01/decypharr:latest
    container_name: decypharr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /opt/mediastack/appdata/decypharr:/app
      - /srv/media:/srv/media
      - /mnt/debrid:/mnt/debrid:rshared
      - /mnt/appdata/decypharr-cache:/cache
    cap_add:
      - SYS_ADMIN                   # required for the FUSE debrid mount
    devices:
      - "/dev/fuse:/dev/fuse"
    security_opt:
      - apparmor:unconfined
    ports:
      - "8282:8282"
    restart: unless-stopped

  torboxarr:
    image: mrjoiny/torboxarr:latest
    container_name: torboxarr
    env_file:
      - torboxarr.env               # TORBOXARR_TORBOX_API_TOKEN, QBIT_PASSWORD, SAB_API_KEY
    volumes:
      - /srv/media:/srv/media
      - torboxarr_config:/config
    ports:
      - "8085:8085"
    restart: unless-stopped

  # ── Streaming tier (on-demand) ───────────────────────────────────────
  aiostreams:
    image: ghcr.io/viren070/aiostreams:nightly
    container_name: aiostreams
    env_file:
      - aiostreams.env
    volumes:
      - /opt/aiostreams/data:/app/data
    ports:
      - "3000:3000"
    restart: unless-stopped

  aiometadata:
    image: ghcr.io/cedya77/aiometadata:latest
    container_name: aiometadata
    env_file:
      - aiometadata.env             # TMDB / TVDB / Trakt / Gemini / etc.
    volumes:
      - /opt/aiometadata/data:/app/addon/data
    ports:
      - "3232:3232"
    depends_on:
      aiometadata_redis:
        condition: service_healthy
    tty: true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3232/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  aiometadata_redis:
    image: redis:latest
    container_name: aiometadata_redis
    command: redis-server --appendonly yes --save 3600 1
    volumes:
      - /opt/aiometadata/cache:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  torboxarr_config:
